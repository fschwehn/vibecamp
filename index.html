<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#1b1a26">
<title>vibecamp — games</title>
<style>
  :root {
    --bg: #1b1a26;
    --card: #2c2a3e;
    --text: #f4f3ff;
    --muted: #9a97b8;
    --accent: #f2b134;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body {
    min-height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    padding: max(8vmin, env(safe-area-inset-top)) 6vw max(8vmin, env(safe-area-inset-bottom));
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 7vmin;
  }
  header { text-align: center; }
  h1 { font-size: 11vw; font-weight: 800; letter-spacing: -0.04em; color: var(--accent); }
  .tagline { color: var(--muted); margin-top: 1.5vmin; font-size: 4vw; }

  .games { width: 100%; max-width: 560px; display: flex; flex-direction: column; gap: 4vmin; }
  a.card {
    display: flex;
    align-items: center;
    gap: 5vw;
    text-decoration: none;
    color: var(--text);
    background: var(--card);
    border-radius: 4vmin;
    padding: 5vw;
    transition: transform 0.12s ease;
  }
  a.card:active { transform: scale(0.98); }
  .glyph {
    flex: none;
    width: 16vw; max-width: 90px;
    aspect-ratio: 1 / 1;
    display: flex; align-items: center; justify-content: center;
    background: var(--bg);
    border-radius: 3vmin;
    font-size: 9vw; font-weight: 800; color: var(--accent);
  }
  .meta .name { font-size: 5.5vw; font-weight: 800; }
  .meta .desc { color: var(--muted); font-size: 3.6vw; margin-top: 1vmin; line-height: 1.35; }
  @media (min-width: 560px) {
    h1 { font-size: 60px; }
    .tagline, .meta .desc { font-size: 18px; }
    .meta .name { font-size: 28px; }
    .glyph { font-size: 44px; }
  }

  footer { color: var(--muted); font-size: 3.2vw; text-align: center; }
  @media (min-width: 560px) { footer { font-size: 14px; } }
</style>
</head>
<body>
  <header>
    <h1>vibecamp</h1>
    <div class="tagline">a tiny pocket arcade</div>
  </header>

  <div class="games" id="games"></div>

  <footer>Built from a phone. More games coming.</footer>

<script>
  // Add a game by dropping its file in the repo and adding one entry here.
  const GAMES = [
    {
      glyph: "÷",
      name: "Divide",
      desc: "Slide tiles to combine them: a smaller number divides a larger one. Equal pairs collapse to a 1, and 1s annihilate anything they touch.",
      url: "divide.html"
    },
    {
      glyph: "=",
      name: "Equate",
      desc: "Numbers and operators slide together. Arm an operator with a number (like 5−), then run it on the next number.",
      url: "equate.html"
    },
    {
      glyph: "▲",
      name: "Ascend",
      desc: "A leveled take on Divide: only composite numbers spawn, starting small. Every few spawns, bigger numbers join the pool — climb the levels.",
      url: "ascend.html"
    }
  ];

  const list = document.getElementById("games");
  for (const g of GAMES) {
    const a = document.createElement("a");
    a.className = "card";
    a.href = g.url;
    const glyph = document.createElement("div");
    glyph.className = "glyph";
    glyph.textContent = g.glyph;
    const meta = document.createElement("div");
    meta.className = "meta";
    const name = document.createElement("div");
    name.className = "name";
    name.textContent = g.name;
    const desc = document.createElement("div");
    desc.className = "desc";
    desc.textContent = g.desc;
    meta.appendChild(name);
    meta.appendChild(desc);
    a.appendChild(glyph);
    a.appendChild(meta);
    list.appendChild(a);
  }
</script>
</body>
</html>
