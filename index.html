<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#1b1a26">
<title>2048 — vibecamp</title>
<style>
  :root {
    --bg: #1b1a26;
    --board: #2c2a3e;
    --cell: #3a3850;
    --text: #f4f3ff;
    --muted: #9a97b8;
    --accent: #f2b134;
    --gap: 2.5vmin;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    overscroll-behavior: none;
    touch-action: none;
  }
  body {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 3vmin;
    padding: max(3vmin, env(safe-area-inset-top)) 4vmin max(3vmin, env(safe-area-inset-bottom));
    user-select: none;
  }
  header {
    width: 100%;
    max-width: 92vmin;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 3vmin;
  }
  h1 {
    font-size: 9vmin;
    font-weight: 800;
    letter-spacing: -0.03em;
    color: var(--accent);
  }
  .scores { display: flex; gap: 2vmin; }
  .score-box {
    background: var(--board);
    border-radius: 1.6vmin;
    padding: 1.4vmin 3vmin;
    text-align: center;
    min-width: 20vmin;
  }
  .score-box .label {
    font-size: 2.6vmin;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    color: var(--muted);
    font-weight: 700;
  }
  .score-box .value { font-size: 5vmin; font-weight: 800; }

  .board-wrap {
    position: relative;
    width: 92vmin;
    max-width: 92vmin;
    aspect-ratio: 1 / 1;
  }
  .board {
    position: absolute;
    inset: 0;
    background: var(--board);
    border-radius: 2.4vmin;
    padding: var(--gap);
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    grid-template-rows: repeat(4, 1fr);
    gap: var(--gap);
  }
  .grid-cell { background: var(--cell); border-radius: 1.6vmin; }

  .tiles {
    position: absolute;
    inset: var(--gap);
    pointer-events: none;
  }
  .tile {
    position: absolute;
    width: calc((100% - 3 * var(--gap)) / 4);
    height: calc((100% - 3 * var(--gap)) / 4);
    border-radius: 1.6vmin;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: 800;
    font-size: 7vmin;
    transition: transform 0.12s ease-in-out;
    will-change: transform;
  }
  .tile.pop { animation: pop 0.16s ease; }
  .tile.spawn { animation: spawn 0.16s ease; }
  @keyframes pop { 0% { transform: var(--pos) scale(1); } 50% { transform: var(--pos) scale(1.16); } 100% { transform: var(--pos) scale(1); } }
  @keyframes spawn { 0% { transform: var(--pos) scale(0); } 100% { transform: var(--pos) scale(1); } }

  .t2    { background: #6c5ce7; }
  .t4    { background: #5f4bd6; }
  .t8    { background: #e17055; color: #fff; }
  .t16   { background: #e08e0b; color: #fff; }
  .t32   { background: #f0932b; color: #fff; }
  .t64   { background: #eb4d4b; color: #fff; }
  .t128  { background: #f2b134; color: #1b1a26; font-size: 6vmin; }
  .t256  { background: #f6c945; color: #1b1a26; font-size: 6vmin; }
  .t512  { background: #facc15; color: #1b1a26; font-size: 6vmin; }
  .t1024 { background: #00b894; color: #fff; font-size: 4.6vmin; }
  .t2048 { background: #00cec9; color: #1b1a26; font-size: 4.6vmin; box-shadow: 0 0 6vmin rgba(0,206,201,0.7); }
  .tbig  { background: #0984e3; color: #fff; font-size: 4.6vmin; }

  footer {
    width: 100%;
    max-width: 92vmin;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 3vmin;
  }
  p.hint { color: var(--muted); font-size: 3vmin; }
  button {
    background: var(--accent);
    color: #1b1a26;
    border: none;
    border-radius: 1.6vmin;
    padding: 2vmin 4vmin;
    font-size: 3.4vmin;
    font-weight: 800;
    cursor: pointer;
  }
  button:active { transform: scale(0.96); }

  .overlay {
    position: absolute;
    inset: 0;
    background: rgba(27,26,38,0.86);
    border-radius: 2.4vmin;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 3vmin;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.25s ease;
    z-index: 5;
  }
  .overlay.show { opacity: 1; pointer-events: auto; }
  .overlay .msg { font-size: 9vmin; font-weight: 800; }
  .overlay.win .msg { color: var(--accent); }
</style>
</head>
<body>
  <header>
    <h1>2048</h1>
    <div class="scores">
      <div class="score-box"><div class="label">Score</div><div class="value" id="score">0</div></div>
      <div class="score-box"><div class="label">Best</div><div class="value" id="best">0</div></div>
    </div>
  </header>

  <div class="board-wrap">
    <div class="board" id="board"></div>
    <div class="tiles" id="tiles"></div>
    <div class="overlay" id="overlay">
      <div class="msg" id="overlay-msg">Game Over</div>
      <button id="overlay-btn">Try again</button>
    </div>
  </div>

  <footer>
    <p class="hint">Swipe to move the tiles.</p>
    <button id="new-game">New Game</button>
  </footer>

<script>
(function () {
  "use strict";
  const SIZE = 4;
  const boardEl = document.getElementById("board");
  const tilesEl = document.getElementById("tiles");
  const scoreEl = document.getElementById("score");
  const bestEl = document.getElementById("best");
  const overlay = document.getElementById("overlay");
  const overlayMsg = document.getElementById("overlay-msg");

  let grid, score, best, won, idCounter;
  best = parseInt(localStorage.getItem("best2048") || "0", 10);

  // Build static background cells
  for (let i = 0; i < SIZE * SIZE; i++) {
    const c = document.createElement("div");
    c.className = "grid-cell";
    boardEl.appendChild(c);
  }

  function emptyGrid() {
    return Array.from({ length: SIZE }, () => Array(SIZE).fill(null));
  }

  function newGame() {
    grid = emptyGrid();
    score = 0;
    won = false;
    idCounter = 0;
    overlay.classList.remove("show", "win");
    addRandom();
    addRandom();
    render(true);
    updateScore();
  }

  function addRandom() {
    const empty = [];
    for (let r = 0; r < SIZE; r++)
      for (let c = 0; c < SIZE; c++)
        if (!grid[r][c]) empty.push([r, c]);
    if (!empty.length) return;
    const [r, c] = empty[Math.floor(Math.random() * empty.length)];
    grid[r][c] = { id: ++idCounter, value: Math.random() < 0.9 ? 2 : 4, isNew: true };
  }

  function tileClass(v) {
    if (v <= 2048) return "t" + v;
    return "tbig";
  }

  function posTransform(r, c) {
    // gap is the same var used in CSS; tiles container already offset by gap.
    return "translate(calc(" + c + " * (100% + var(--gap))), calc(" + r + " * (100% + var(--gap))))";
  }

  function render(initial) {
    tilesEl.innerHTML = "";
    for (let r = 0; r < SIZE; r++) {
      for (let c = 0; c < SIZE; c++) {
        const cell = grid[r][c];
        if (!cell) continue;
        const el = document.createElement("div");
        const pos = posTransform(r, c);
        el.className = "tile " + tileClass(cell.value);
        el.style.setProperty("--pos", pos);
        el.style.transform = pos;
        el.textContent = cell.value;
        if (cell.merged) el.classList.add("pop");
        if (cell.isNew && !initial) el.classList.add("spawn");
        if (cell.isNew && initial) el.classList.add("spawn");
        tilesEl.appendChild(el);
        cell.isNew = false;
        cell.merged = false;
      }
    }
  }

  function updateScore() {
    scoreEl.textContent = score;
    if (score > best) {
      best = score;
      localStorage.setItem("best2048", String(best));
    }
    bestEl.textContent = best;
  }

  // Rotate grid clockwise so we can always merge "left"
  function rotate(g) {
    const n = emptyGrid();
    for (let r = 0; r < SIZE; r++)
      for (let c = 0; c < SIZE; c++)
        n[c][SIZE - 1 - r] = g[r][c];
    return n;
  }

  function moveLeft(g) {
    let moved = false;
    for (let r = 0; r < SIZE; r++) {
      const row = g[r].filter(Boolean);
      for (let i = 0; i < row.length - 1; i++) {
        if (row[i].value === row[i + 1].value) {
          row[i] = { id: row[i].id, value: row[i].value * 2, merged: true };
          score += row[i].value;
          if (row[i].value === 2048) won = true;
          row.splice(i + 1, 1);
        }
      }
      while (row.length < SIZE) row.push(null);
      for (let c = 0; c < SIZE; c++) {
        if ((g[r][c] && g[r][c].id) !== (row[c] && row[c].id) ||
            (g[r][c] && g[r][c].value) !== (row[c] && row[c].value)) moved = true;
        g[r][c] = row[c];
      }
    }
    return moved;
  }

  // dir: 0=left,1=up,2=right,3=down
  function move(dir) {
    if (overlay.classList.contains("show")) return;
    let g = grid;
    for (let i = 0; i < dir; i++) g = rotate(g);
    const moved = moveLeft(g);
    for (let i = 0; i < (4 - dir) % 4; i++) g = rotate(g);
    grid = g;
    if (moved) {
      addRandom();
      render(false);
      updateScore();
      if (won) return endGame(true);
      if (isGameOver()) endGame(false);
    }
  }

  function isGameOver() {
    for (let r = 0; r < SIZE; r++)
      for (let c = 0; c < SIZE; c++) {
        if (!grid[r][c]) return false;
        if (c < SIZE - 1 && grid[r][c].value === grid[r][c + 1].value) return false;
        if (r < SIZE - 1 && grid[r][c].value === grid[r + 1][c].value) return false;
      }
    return true;
  }

  function endGame(isWin) {
    overlayMsg.textContent = isWin ? "You win!" : "Game Over";
    overlay.classList.toggle("win", isWin);
    overlay.classList.add("show");
  }

  // ---- Input: keyboard ----
  window.addEventListener("keydown", (e) => {
    const map = { ArrowLeft: 0, ArrowUp: 1, ArrowRight: 2, ArrowDown: 3,
                  a: 0, w: 1, d: 2, s: 3 };
    if (e.key in map) { e.preventDefault(); move(map[e.key]); }
  });

  // ---- Input: touch swipe ----
  let startX = 0, startY = 0, tracking = false;
  const THRESHOLD = 24;
  const wrap = document.querySelector(".board-wrap");
  wrap.addEventListener("touchstart", (e) => {
    const t = e.changedTouches[0];
    startX = t.clientX; startY = t.clientY; tracking = true;
  }, { passive: true });
  wrap.addEventListener("touchend", (e) => {
    if (!tracking) return;
    tracking = false;
    const t = e.changedTouches[0];
    const dx = t.clientX - startX, dy = t.clientY - startY;
    if (Math.max(Math.abs(dx), Math.abs(dy)) < THRESHOLD) return;
    if (Math.abs(dx) > Math.abs(dy)) move(dx > 0 ? 2 : 0);
    else move(dy > 0 ? 3 : 1);
  }, { passive: true });

  document.getElementById("new-game").addEventListener("click", newGame);
  document.getElementById("overlay-btn").addEventListener("click", newGame);

  bestEl.textContent = best;
  newGame();
})();
</script>
</body>
</html>
